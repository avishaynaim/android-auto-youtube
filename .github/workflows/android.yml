name: Build Android Auto YouTube App

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Build debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: |
          app/build/outputs/apk/debug/app-debug.apk
          build.log

  emulator-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: app-debug
        path: .
    
    - name: Run Android Emulator Test
      uses: reactivecircus/android-emulator-runner@v2.21.0
      with:
        api-level: 34
        target: google_apis
        arch: x86_64
        profile: Nexus 6
        disable-animations: true
        script: |
          adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
          echo "=== Emulator ready, installing APK ==="
          adb install -r app-debug.apk
          echo "=== Checking if app installed ==="
          adb shell pm list packages | grep -i auto
          echo "=== Attempting to start app ==="
          adb shell am start -n com.autoyoutube/.ui.MainActivity
          sleep 2
          adb shell dumpsys activity activities | grep -i "autoyoutube\|mResumedActivity" | head -5
