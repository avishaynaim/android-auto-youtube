name: Build Android Auto YouTube App

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Build debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Verify Android Auto Configuration
      run: |
        echo "=== Android Auto Config Check ==="
        grep -q "YouTubeMediaService" app/src/main/AndroidManifest.xml && echo "✓ MediaService found"
        grep -q "automotive_app_desc" app/src/main/AndroidManifest.xml && echo "✓ Automotive app desc found"
        cat app/src/main/res/xml/automotive_app_desc.xml | grep -q "media" && echo "✓ Media capability found"
        echo "=== All checks passed ==="

  emulator-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: app-debug
        path: .
    
    - name: Setup KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
        sudo mkdir -p /dev/kvm
        sudo mknod /dev/kvm c 10 232
        sudo chmod 666 /dev/kvm
    
    - name: Run Android Emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 34
        target: google_apis
        arch: x86_64
        profile: Nexus 6
        disable-animations: true
        emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio
        script: |
          adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
          echo "=== Emulator ready ==="
          adb install -r app-debug.apk
          echo "=== App installed ==="
          adb shell pm list packages | grep autoyoutube
