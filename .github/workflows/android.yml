name: Build Android Auto YouTube App

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Build debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Verify Android Auto Configuration
      run: |
        echo "=== Android Auto Config Check ==="
        grep -q "YouTubeMediaService" app/src/main/AndroidManifest.xml && echo "✓ MediaService found"
        grep -q "automotive_app_desc" app/src/main/AndroidManifest.xml && echo "✓ Automotive app desc found"
        cat app/src/main/res/xml/automotive_app_desc.xml | grep -q "media" && echo "✓ Media capability found"
        echo "=== All checks passed ==="

  # Emulator test is disabled - Android Automotive emulator is not available on GitHub hosted runners
  # To enable on a self-hosted runner, remove the if condition and the always() fallback
  emulator-test:
    runs-on: ubuntu-latest
    needs: build
    if: false
    steps:
    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: app-debug
        path: .
    
    - name: Setup KVM
      run: |
        sudo mkdir -p /dev/kvm 2>/dev/null || true
        sudo mknod /dev/kvm c 10 232 2>/dev/null || true
        sudo chmod 666 /dev/kvm 2>/dev/null || true
    
    - name: Run Android Emulator with Android Auto
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 34
        target: android-automotive
        arch: x86_64
        profile: Android Auto Automotive Screen
        disable-animations: true
        emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio
        script: |
          adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
          echo "=== Emulator ready ==="
          
          # Install our app
          adb install -r app-debug.apk
          echo "=== Our app installed ==="
          
          # Check if Android Auto is available
          echo "=== Checking for Android Auto ==="
          adb shell pm list packages | grep -i "automotive\|auto" || echo "Android Auto package check"
          
          # Try to start Android Auto
          echo "=== Attempting to launch Android Auto ==="
          adb shell am start -n com.google.android.projection.android.companion/com.google.android.projection.android.companion.DeviceSelectorActivity 2>/dev/null || true
          
          # Check running activities
          sleep 2
          adb shell dumpsys activity activities | grep -i "auto" | head -5 || echo "No auto activity found"
          
          # List media apps (our app should appear as media app)
          echo "=== Listing Media Browser Services ==="
          adb shell service list | grep -i media || echo "Media services check done"
          
          echo "=== Test complete ==="
