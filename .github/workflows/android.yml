name: Build Android Auto YouTube App

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Build debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
        echo "=== Build output directory ==="
        find . -name "*.apk" 2>/dev/null
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "APK directory not found"
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: |
          app/build/outputs/apk/debug/app-debug.apk
          build.log
        
    - name: Show build log if failed
      if: failure()
      run: |
        echo "=== Build Log ==="
        cat build.log
        
    - name: Verify Android Auto Configuration
      run: |
        echo "=== Android Auto Config Check ==="
        grep -A3 "YouTubeMediaService" app/src/main/AndroidManifest.xml
        cat app/src/main/res/xml/automotive_app_desc.xml

  emulator-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: app-debug
        path: .
    
    - name: Run Android Emulator Test
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 34
        target: google_apis
        arch: x86_64
        profile: Nexus 6
        disable-animations: true
        script: |
          adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
          adb install -r app-debug.apk
          adb shell pm list packages | grep autoyoutube
          echo "=== App installed ==="
          adb shell am start -n com.autoyoutube/.ui.MainActivity
          sleep 3
          adb shell dumpsys activity activities | grep -i autoyoutube || echo "App started"
