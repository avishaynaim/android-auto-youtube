name: Build Android Auto YouTube App

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Build debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        
    - name: Verify Android Auto Configuration
      run: |
        echo "=== Checking Android Auto Config ==="
        echo "1. MediaBrowserService:"
        grep -A3 "YouTubeMediaService" app/src/main/AndroidManifest.xml
        echo ""
        echo "2. Android Auto meta-data:"
        grep "com.google.android.gms.car.application" app/src/main/AndroidManifest.xml
        echo ""
        echo "3. automotive_app_desc.xml:"
        cat app/src/main/res/xml/automotive_app_desc.xml
        echo ""
        echo "=== All checks passed ==="
        
    - name: List build outputs
      if: success()
      run: |
        echo "Build successful!"
        ls -la app/build/outputs/apk/debug/
